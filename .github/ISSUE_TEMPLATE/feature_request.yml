name: Feature Request
description: Suggest a new feature or improvement for MergeShip
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make MergeShip better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap this addresses.
      placeholder: As a contributor / maintainer, I find it hard to...
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New Feature
        - UI / UX Improvement
        - Performance
        - Developer Experience
        - Other
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who benefits?
      options:
        - Contributors
        - Maintainers
        - Both
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Describe the behavior you'd like to see.
      placeholder: I'd like MergeShip to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, references, or related issues.
    validations:
      required: false
