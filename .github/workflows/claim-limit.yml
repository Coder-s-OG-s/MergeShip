name: Claim Limit

on:
  issues:
    types: [assigned]
  pull_request_target:
    types: [opened, reopened]

jobs:
  check-claim-limit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Check open issue assignments
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const assignee = context.payload.assignee.login;
            const issueNumber = context.payload.issue.number;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              assignee,
              state: 'open',
              per_page: 100,
            });

            const openIssues = issues.filter(i => !i.pull_request);
            const count = openIssues.length;

            if (count > 3) {
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: [assignee],
              });

              const list = openIssues
                .filter(i => i.number !== issueNumber)
                .slice(0, 5)
                .map(i => '- #' + i.number + ' - ' + i.title)
                .join('\n');

              const body = 'Hey @' + assignee + '\n\n'
                + 'You currently have **' + (count - 1) + ' open issues** assigned to you. The limit is **3 at a time**.\n\n'
                + 'Please close or get your existing work merged before picking up a new issue:\n\n'
                + list + '\n\n'
                + 'Once those are resolved, feel free to re-assign yourself here. '
                + 'Questions? Drop them in [GitHub Discussions](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/discussions).';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Check open PR limit
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;

            if (author.endsWith('[bot]') || author.endsWith('-bot')) return;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const authorPrs = prs.filter(pr => pr.user.login === author);
            const count = authorPrs.length;

            if (count > 3) {
              const list = authorPrs
                .filter(pr => pr.number !== prNumber)
                .slice(0, 5)
                .map(pr => '- #' + pr.number + ' - ' + pr.title)
                .join('\n');

              const body = 'Hey @' + author + '\n\n'
                + 'You have **' + count + ' open PRs** right now. The limit is **3 at a time**.\n\n'
                + 'Please get your existing PRs merged or closed before opening new ones:\n\n'
                + list + '\n\n'
                + 'This PR will remain open but won\'t be reviewed until you\'re under the limit. '
                + 'See our [Contributing Guidelines](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/CONTRIBUTING.md) for details.';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
