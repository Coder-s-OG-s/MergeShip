name: "CI/CD: Fix #748 — pingReviewers auth scoping"

on:
  pull_request:
    branches: [main]
    paths:
      - "src/app/actions/maintainer/ping-reviewers.ts"
      - "src/app/actions/maintainer/ping-reviewers.test.ts"
  push:
    branches: [fix/748-ping-reviewers-auth-scoping]

concurrency:
  group: ci-748-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-check:
    name: Verify authorization pattern
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify listMaintainerRepos is imported
        run: |
          if ! grep -q "listMaintainerRepos" src/app/actions/maintainer/ping-reviewers.ts; then
            echo "::error::listMaintainerRepos not imported in ping-reviewers.ts"
            exit 1
          fi
          echo "PASS: listMaintainerRepos is imported"

      - name: Verify pingReviewers calls listMaintainerRepos
        run: |
          if ! grep -A 30 "export async function pingReviewers" src/app/actions/maintainer/ping-reviewers.ts | grep -q "listMaintainerRepos"; then
            echo "::error::pingReviewers does not call listMaintainerRepos"
            exit 1
          fi
          echo "PASS: pingReviewers includes authorization check"

      - name: Verify unauthorized users are rejected
        run: |
          if ! grep -q "not_authorised" src/app/actions/maintainer/ping-reviewers.ts; then
            echo "::error::pingReviewers does not return not_authorised"
            exit 1
          fi
          echo "PASS: pingReviewers rejects unauthorized users"

  ci:
    name: Tests & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run ping-reviewers tests
        run: npx vitest run src/app/actions/maintainer/ping-reviewers.test.ts

      - name: Run all tests with coverage
        run: npm run test:coverage

  notify-failure:
    needs: [security-check, ci]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post failure comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## ❌ CI failed on fix/748-ping-reviewers-auth-scoping',
              '',
              'One or more checks failed. Please review the logs.',
              `[Full CI log](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
