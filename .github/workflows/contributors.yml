name: Dynamic Contributors Update

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
      - master  # Catch-all in case your default branch is master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Contributors Table
        run: |
          # 1. Dynamically get the current repository owner and name from the environment
          REPO_NAME="${{ github.repository }}"
          OWNER=$(echo "$REPO_NAME" | cut -d'/' -f1)
          PROJECT=$(echo "$REPO_NAME" | cut -d'/' -f2)
          
          # 2. Create the config file pointing dynamically to THIS fork
          echo "{\"files\":[\"README.md\"],\"imageSize\":60,\"commit\":false,\"contributors\":[],\"contributorsPerLine\":10,\"projectOwner\":\"$OWNER\",\"projectName\":\"$PROJECT\"}" > .all-contributorsrc
          
          # 3. Fetch contributors from THIS fork. If empty, fallback to the upstream parent repo
          USERS=$(curl -s "https://api.github.com/repos/$REPO_NAME/contributors" | jq -r '.[].login')
          if [ -z "$USERS" ] || [ "$USERS" = "null" ]; then
            USERS=$(curl -s "https://api.github.com/repos/Coder-s-OG-s/MergeShip/contributors" | jq -r '.[].login')
          fi
          
          # 4. Loop through and register them
          for user in $USERS; do
            if [[ "$user" == *"bot"* || "$user" = "null" ]]; then continue; fi
            npx all-contributors-cli add "$user" code || true
          done
          
          # 5. Compile layout into the README
          npx all-contributors-cli generate
          
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: dynamically update contributors grid [skip ci]"
          file_pattern: "README.md .all-contributorsrc"
          branch: ${{ github.ref_name }} # Forces it to push to your CURRENT active branch
